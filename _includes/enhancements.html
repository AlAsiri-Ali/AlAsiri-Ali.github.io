{% assign aa_lang = page.lang | default: 'en' %}
{% assign aa_labels = site.data.aa_labels[aa_lang] | default: site.data.aa_labels.en %}
<script>
(function () {
  const root = document.documentElement;
  const body = document.body;
  const themeButton = document.getElementById('aaThemeToggle');
  const backButton = document.getElementById('aaBackToTop');
  const searchToggle = document.querySelector('.search__toggle');
  const searchContent = document.getElementById('site-search');
  const searchInput = document.getElementById('search') || document.getElementById('cse-search-input-box-id');
  const labels = {
    themeDark: {{ aa_labels.theme_dark | jsonify }},
    themeLight: {{ aa_labels.theme_light | jsonify }},
    openSearch: {{ aa_labels.open_search | jsonify }},
    closeSearch: {{ aa_labels.close_search | jsonify }},
    collapseSidebar: {{ aa_labels.collapse_sidebar | default: "Collapse profile sidebar" | jsonify }},
    expandSidebar: {{ aa_labels.expand_sidebar | default: "Expand profile sidebar" | jsonify }}
  };

  function safeStorageGet(key) {
    try { return localStorage.getItem(key); } catch (error) { return null; }
  }

  function safeStorageSet(key, value) {
    try { localStorage.setItem(key, value); } catch (error) {}
  }

  const saved = safeStorageGet('aa-theme');
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  const initial = saved || root.getAttribute('data-theme') || (prefersDark ? 'dark' : 'light');

  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    body.classList.toggle('theme-dark', theme === 'dark');
    if (themeButton) {
      themeButton.innerHTML = theme === 'dark'
        ? '<svg class="aa-svg-icon aa-svg-icon--sun" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2.5v2M12 19.5v2M4.6 4.6 6 6M18 18l1.4 1.4M2.5 12h2M19.5 12h2M4.6 19.4 6 18M18 6l1.4-1.4"></path></svg>'
        : '<svg class="aa-svg-icon aa-svg-icon--moon" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20.5 14.2A8.2 8.2 0 0 1 9.8 3.5 8.5 8.5 0 1 0 20.5 14.2Z"></path></svg>';
      themeButton.setAttribute('aria-label', theme === 'dark' ? labels.themeLight : labels.themeDark);
      themeButton.setAttribute('aria-pressed', theme === 'dark' ? 'true' : 'false');
    }
  }

  applyTheme(initial);

  if (themeButton) {
    themeButton.addEventListener('click', function () {
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      safeStorageSet('aa-theme', next);
      applyTheme(next);
    });
  }

  if (backButton) {
    const updateBackButton = function () {
      const visible = window.scrollY > 500;
      backButton.classList.toggle('is-visible', visible);
      backButton.setAttribute('tabindex', visible ? '0' : '-1');
    };
    updateBackButton();
    window.addEventListener('scroll', updateBackButton, { passive: true });
    backButton.addEventListener('click', function () {
      window.scrollTo({ top: 0, behavior: window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 'auto' : 'smooth' });
    });
  }

  if (searchToggle && searchContent) {
    const updateSearchState = function () {
      const open = searchContent.classList.contains('is--visible') || body.classList.contains('search-content-visible');
      searchToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      searchToggle.setAttribute('aria-label', open ? labels.closeSearch : labels.openSearch);
      searchContent.setAttribute('aria-hidden', open ? 'false' : 'true');
      if (searchInput) searchInput.setAttribute('tabindex', open ? '0' : '-1');
    };

    searchToggle.addEventListener('click', function () {
      window.setTimeout(function () {
        updateSearchState();
        if (searchInput && searchToggle.getAttribute('aria-expanded') === 'true') searchInput.focus();
      }, 0);
    });

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape' && searchToggle.getAttribute('aria-expanded') === 'true') {
        searchToggle.click();
        searchToggle.focus();
      }
    });

    updateSearchState();
  }


  document.querySelectorAll('.aa-copy-email').forEach(function (button) {
    const original = button.textContent;
    button.addEventListener('click', function () {
      const value = button.getAttribute('data-copy') || '';
      const doneText = document.body.classList.contains('lang-ar') ? 'تم النسخ' : 'Copied';
      const failText = document.body.classList.contains('lang-ar') ? 'انسخ البريد يدويًا' : 'Copy manually';
      function setTemporaryLabel(text) {
        button.textContent = text;
        window.setTimeout(function () { button.textContent = original; }, 1600);
      }
      if (navigator.clipboard && value) {
        navigator.clipboard.writeText(value).then(function () {
          setTemporaryLabel(doneText);
        }).catch(function () {
          setTemporaryLabel(failText);
        });
      } else {
        setTemporaryLabel(failText);
      }
    });
  });


  document.querySelectorAll('[data-project-sort]').forEach(function (sortBox) {
    const grid = sortBox.parentElement.querySelector('[data-project-grid]');
    if (!grid) return;
    const buttons = Array.prototype.slice.call(sortBox.querySelectorAll('[data-sort]'));
    function normalize(value) { return (value || '').toString().toLowerCase(); }
    function sortCards(mode) {
      const cards = Array.prototype.slice.call(grid.querySelectorAll('.aa-project-card'));
      grid.classList.add('is-sorting');
      cards.sort(function (a, b) {
        if (mode === 'newest') return normalize(b.dataset.date).localeCompare(normalize(a.dataset.date));
        if (mode === 'oldest') return normalize(a.dataset.date).localeCompare(normalize(b.dataset.date));
        if (mode === 'title') return normalize(a.dataset.title).localeCompare(normalize(b.dataset.title), undefined, { sensitivity: 'base' });
        if (mode === 'category') {
          const c = normalize(a.dataset.category).localeCompare(normalize(b.dataset.category), undefined, { sensitivity: 'base' });
          if (c !== 0) return c;
          return Number(a.dataset.priority || 999) - Number(b.dataset.priority || 999);
        }
        return Number(a.dataset.priority || 999) - Number(b.dataset.priority || 999);
      });
      cards.forEach(function (card) { grid.appendChild(card); });
      window.setTimeout(function () { grid.classList.remove('is-sorting'); }, 160);
    }
    buttons.forEach(function (button) {
      button.addEventListener('click', function () {
        buttons.forEach(function (b) { b.classList.remove('is-active'); b.setAttribute('aria-pressed', 'false'); });
        button.classList.add('is-active');
        button.setAttribute('aria-pressed', 'true');
        sortCards(button.getAttribute('data-sort') || 'importance');
      });
      button.setAttribute('aria-pressed', button.classList.contains('is-active') ? 'true' : 'false');
    });
  });


})();
</script>
