{% assign aa_lang = page.lang | default: 'en' %}
{% assign aa_labels = site.data.aa_labels[aa_lang] | default: site.data.aa_labels.en %}
<button class="aa-back-to-top" id="aaBackToTop" type="button" aria-label="{{ aa_labels.back_to_top }}" tabindex="-1">{% include aa/icon.html name="arrow-up" %}</button>
<button class="aa-theme-toggle" id="aaThemeToggle" type="button" aria-label="{{ aa_labels.theme_dark }}" aria-pressed="false">{% include aa/icon.html name="moon" %}</button>
