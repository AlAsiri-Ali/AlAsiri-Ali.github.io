# Ali AlAsiri website configuration

minimal_mistakes_skin        : "air"

locale                       : "en-US"
rtl                          : false
title                        : "Ali AlAsiri"
title_separator              : "|"
subtitle                     : "AI & Information Systems Professional"
name                         : "Ali AlAsiri"
description                  : "Ali AlAsiri portfolio: Artificial Intelligence, Information Systems, intelligent systems, model evaluation, and data-driven workflows."
url                          : "https://AlAsiri-Ali.github.io"
baseurl                      : ""
repository                   : "AlAsiri-Ali/AlAsiri-Ali.github.io"
teaser                       : /assets/images/OGImage.png
og_image                     : /assets/images/OGImage.png
masthead_title               : "Ali AlAsiri"
breadcrumbs                  : false
words_per_minute             : 200
enable_copy_code_button      : true
copyright                    : "Copyright © 2026 Ali AlAsiri. All Rights Reserved."
timezone                     : Asia/Riyadh

social:
  type: Person
  name: "Ali AlAsiri"
  links:
    - "https://github.com/AlAsiri-Ali"
    - "https://linkedin.com/in/ali-asiri-b85038206"
    - "https://x.com/Ali_M_Asiri"

search                       : true
search_full_content          : false
search_provider              : lunr

lunr:
  search_within_pages: true

analytics:
  provider: "google"
  google:
    tracking_id: "G-PD18B3Z8DJ"

author:
  name                       : "Ali AlAsiri"
  avatar                     : /assets/images/profile-visual.png
  bio                        : "AI & Information Systems professional focused on building reliable, measurable, and human-centered intelligent systems."
  location                   : "Saudi Arabia"
  email                      : "aliasiri.dev@gmail.com"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/AlAsiri-Ali"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/ali-asiri-b85038206"
    - label: "X"
      icon: "fab fa-fw fa-x-twitter"
      url: "https://x.com/Ali_M_Asiri"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:aliasiri.dev@gmail.com"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/AlAsiri-Ali"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/ali-asiri-b85038206"
    - label: "X"
      icon: "fab fa-fw fa-x-twitter"
      url: "https://x.com/Ali_M_Asiri"
    - label: "Privacy"
      icon: "fas fa-fw fa-user-shield"
      url: "/privacy-policy/"
  since: "2025"

include:
  - _pages

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README-theme.md
  - README.md
  - tmp

keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development

collections:
  portfolio:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: true
      related: true
      toc: true
      toc_sticky: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: false
      share: true
      related: false
      show_date: false
      toc: true
      toc_sticky: true
  - scope:
      path: ""
    values:
      layout: single
      author_profile: false


# Multilingual settings
languages:
  default: en
  supported:
    - en
    - ar
  english_base: "/"
  arabic_base: "/ar/"
